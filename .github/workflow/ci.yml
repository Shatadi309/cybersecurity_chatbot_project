name: .VANTA cybersecurity

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    # Restore dependencies
    - name: Restore dependencies
      run: dotnet restore cybersecurity_chatbot_project.slnx

    # Build project
    - name: Build project
      run: dotnet build cybersecurity_chatbot_project.slnx --no-restore --configuration Release

    # Run tests (will skip if none exist)
    - name: Run tests
      run: dotnet test cybersecurity_chatbot_project.slnx --no-build --verbosity normal
